name: Warm Apify Cache

on:
  schedule:
    # Runs at 3:00 AM UTC every day (11:00 PM EST)
    - cron: '0 3 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  warm-cache:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger cache pre-warm
        run: |
          curl -s -o /dev/null -w "%{http_code}" \
            -X GET \
            "https://gradlaunch-weld.vercel.app/api/warmcache"
        timeout-minutes: 5
